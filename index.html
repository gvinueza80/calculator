<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    }

    .calc {
      width: 320px;
      background: #1c1c1e;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.8);
    }

    .display {
      padding: 16px 20px 12px;
      min-height: 116px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 2px;
    }

    #expr {
      color: rgba(255,255,255,0.45);
      font-size: 17px;
      font-weight: 300;
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-height: 22px;
    }

    #curr {
      color: #fff;
      font-size: 54px;
      font-weight: 200;
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.1;
      transition: font-size 0.1s;
    }

    #curr.md { font-size: 40px; }
    #curr.sm { font-size: 30px; }

    .btns {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: #3a3a3c;
    }

    button {
      background: #2c2c2e;
      color: #fff;
      border: none;
      height: 72px;
      font-size: 26px;
      font-weight: 400;
      font-family: inherit;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button:hover  { filter: brightness(1.3); }
    button:active { filter: brightness(1.6); }

    .fn  { background: #3a3a3c; font-size: 22px; }
    .op  { background: #ff9f0a; }
    .op.lit { background: #fff; color: #ff9f0a; }
    .eq  { background: #ff9f0a; }
    .wide { grid-column: span 2; justify-content: flex-start; padding-left: 26px; }
  </style>
</head>
<body>
  <div class="calc">
    <div class="display">
      <div id="expr"></div>
      <div id="curr">0</div>
    </div>
    <div class="btns">
      <button class="fn" id="b-ac" data-a="clear">AC</button>
      <button class="fn"           data-a="sign">+/−</button>
      <button class="fn"           data-a="pct">%</button>
      <button class="op"           data-a="op" data-op="/">÷</button>

      <button class="fn"           data-a="sqrt">√</button>
      <button class="fn"           data-a="recip">1/x</button>
      <button class="fn"           data-a="back">⌫</button>
      <button class="op"           data-a="op" data-op="*">×</button>

      <button data-a="d" data-v="7">7</button>
      <button data-a="d" data-v="8">8</button>
      <button data-a="d" data-v="9">9</button>
      <button class="op" data-a="op" data-op="-">−</button>

      <button data-a="d" data-v="4">4</button>
      <button data-a="d" data-v="5">5</button>
      <button data-a="d" data-v="6">6</button>
      <button class="op" data-a="op" data-op="+">+</button>

      <button data-a="d" data-v="1">1</button>
      <button data-a="d" data-v="2">2</button>
      <button data-a="d" data-v="3">3</button>
      <button class="eq" data-a="eq" style="grid-row: span 2">=</button>

      <button class="wide" data-a="d" data-v="0">0</button>
      <button data-a="dot">.</button>
    </div>
  </div>

  <script>
    const state = {
      expr: '',
      cur:  '0',
      lop:  null,   // left operand for pending binary op
      op:   null,   // pending operator
      done: false,  // just evaluated (= or unary)
      wait: false,  // waiting for second operand after pressing operator
    };

    const SYM = { '+': '+', '-': '−', '*': '×', '/': '÷' };

    function fmt(n) {
      if (!isFinite(n)) return null;
      const precise = parseFloat(n.toPrecision(10));
      const str = precise.toString();
      return str.length > 13 ? parseFloat(n.toPrecision(6)).toString() : str;
    }

    function setError() {
      Object.assign(state, { expr: '', cur: 'Error', lop: null, op: null, done: false, wait: false });
    }

    function compute(a, o, b) {
      if (o === '+') return a + b;
      if (o === '-') return a - b;
      if (o === '*') return a * b;
      if (o === '/') return b === 0 ? null : a / b;
    }

    function inputDigit(d) {
      if (state.cur === 'Error') {
        Object.assign(state, { cur: d === '0' ? '0' : d, expr: '', lop: null, op: null, wait: false, done: false });
        return;
      }
      if (state.wait) {
        state.cur = d === '0' ? '0' : d;
        state.wait = false;
      } else if (state.done) {
        state.cur = d === '0' ? '0' : d;
        state.expr = ''; state.op = null; state.lop = null; state.done = false;
      } else {
        const digits = state.cur.replace(/[^0-9]/g, '');
        if (state.cur === '0' && d !== '.') state.cur = d;
        else if (digits.length < 12) state.cur += d;
      }
    }

    function inputDot() {
      if (state.cur === 'Error') return;
      if (state.wait || state.done) {
        state.cur = '0.';
        if (state.done) { state.expr = ''; state.op = null; state.lop = null; }
        state.wait = false; state.done = false;
        return;
      }
      if (!state.cur.includes('.')) state.cur += '.';
    }

    function inputOperator(o) {
      if (state.cur === 'Error') return;
      const v = parseFloat(state.cur);
      if (state.op && !state.wait) {
        const r = compute(state.lop, state.op, v);
        if (r === null) { setError(); return; }
        const f = fmt(r);
        if (!f) { setError(); return; }
        state.lop = r; state.cur = f;
      } else {
        state.lop = v;
      }
      state.op = o;
      state.expr = fmt(state.lop) + ' ' + SYM[o];
      state.wait = true; state.done = false;
    }

    function inputEquals() {
      if (state.cur === 'Error' || !state.op) return;
      const v = parseFloat(state.cur);
      const r = compute(state.lop, state.op, v);
      if (r === null) { setError(); return; }
      const f = fmt(r);
      if (!f) { setError(); return; }
      state.expr = fmt(state.lop) + ' ' + SYM[state.op] + ' ' + fmt(v) + ' =';
      state.cur = f; state.lop = r; state.op = null; state.done = true; state.wait = false;
    }

    function inputSign() {
      if (state.cur === 'Error' || state.cur === '0') return;
      state.cur = state.cur.startsWith('-') ? state.cur.slice(1) : '-' + state.cur;
    }

    function inputPercent() {
      if (state.cur === 'Error') return;
      const v = parseFloat(state.cur);
      // For + and −, percent means "X% of left operand"; otherwise just divide by 100
      const r = (state.op === '+' || state.op === '-') ? state.lop * v / 100 : v / 100;
      const f = fmt(r);
      if (!f) { setError(); return; }
      state.cur = f;
    }

    function inputSqrt() {
      if (state.cur === 'Error') return;
      const v = parseFloat(state.cur);
      if (v < 0) { setError(); return; }
      const f = fmt(Math.sqrt(v));
      if (!f) { setError(); return; }
      state.cur = f; state.done = true;
    }

    function inputRecip() {
      if (state.cur === 'Error') return;
      const v = parseFloat(state.cur);
      if (v === 0) { setError(); return; }
      const f = fmt(1 / v);
      if (!f) { setError(); return; }
      state.cur = f; state.done = true;
    }

    function inputBack() {
      if (state.cur === 'Error') { inputClear(); return; }
      if (state.done || state.wait) return;
      state.cur = state.cur.length > 1 ? state.cur.slice(0, -1) : '0';
      if (state.cur === '-') state.cur = '0';
    }

    function inputClear() {
      Object.assign(state, { expr: '', cur: '0', lop: null, op: null, done: false, wait: false });
    }

    function render() {
      document.getElementById('expr').textContent = state.expr;
      const el = document.getElementById('curr');
      el.textContent = state.cur;
      const n = state.cur.length;
      el.className = n > 10 ? 'sm' : n > 7 ? 'md' : '';
      document.getElementById('b-ac').textContent =
        (state.cur !== '0' || state.expr || state.op) ? 'C' : 'AC';
      document.querySelectorAll('.op').forEach(b => {
        b.classList.toggle('lit', state.wait && b.dataset.op === state.op);
      });
    }

    document.querySelector('.btns').addEventListener('click', e => {
      const btn = e.target.closest('button');
      if (!btn) return;
      const a = btn.dataset.a;
      if      (a === 'd')     inputDigit(btn.dataset.v);
      else if (a === 'dot')   inputDot();
      else if (a === 'op')    inputOperator(btn.dataset.op);
      else if (a === 'eq')    inputEquals();
      else if (a === 'clear') inputClear();
      else if (a === 'sign')  inputSign();
      else if (a === 'pct')   inputPercent();
      else if (a === 'sqrt')  inputSqrt();
      else if (a === 'recip') inputRecip();
      else if (a === 'back')  inputBack();
      render();
    });

    document.addEventListener('keydown', e => {
      if (e.ctrlKey || e.metaKey || e.altKey) return;
      const k = e.key;
      if      (k >= '0' && k <= '9') inputDigit(k);
      else if (k === '.')            inputDot();
      else if (k === '+')            inputOperator('+');
      else if (k === '-')            inputOperator('-');
      else if (k === '*')            inputOperator('*');
      else if (k === '/')            { e.preventDefault(); inputOperator('/'); }
      else if (k === 'Enter' || k === '=') inputEquals();
      else if (k === 'Backspace')    inputBack();
      else if (k === 'Escape')       inputClear();
      else if (k === '%')            inputPercent();
      else return;
      render();
    });

    render();
  </script>
</body>
</html>
